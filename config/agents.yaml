# Phase 0 default: deterministic Fake agents. Set implementation: real or
# ORACLE_COUNCIL_USE_REAL=1 to invoke the configured CLI adapter.
#
# `id` is the participant identity, not a statement about which adapter
# implementation resolved it this run. It stays "claude-code"/"codex-cli"
# whether `implementation: mock` or `real` is in effect, so that
# participants/executions[].agent_id in output and metrics never say
# "fake-*" while a real adapter actually answered (found reviewing a real
# metrics run: the old "fake-claude"/"fake-codex" ids leaked into
# --json's `participants` field even with ORACLE_COUNCIL_USE_REAL=1).
#
# Role priorities are set so all 4 registered participants take a distinct
# leading role somewhere in the plan (claude-code: respond/synthesize,
# codex-cli: respond/verify/audit, grok-cli: claim_extract/clarify,
# agy-cli: criticize) rather than 2 agents winning every phase by default
# (0) tie-break ordering - see assignment.py's build_execution_plan, which
# caps participants at 4 (ranked[:4]), exactly matching a 4-AI council.
agents:
  - id: claude-code
    adapter: claude
    implementation: mock
    enabled: true
    role_priority:
      respond: 100
      synthesize: 100
      audit: 90
  - id: codex-cli
    adapter: codex
    implementation: mock
    enabled: true
    role_priority:
      respond: 90
      verify: 100
      audit: 100
  - id: grok-cli
    adapter: grok
    implementation: mock
    enabled: true
    role_priority:
      respond: 80
      claim_extract: 100
      clarify: 100
  - id: agy-cli
    adapter: agy
    implementation: mock
    enabled: true
    role_priority:
      respond: 70
      criticize: 100
      clarify: 90
